<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chumart AI</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23111'/><path d='M50 18 L76 33 L76 67 L50 82 L24 67 L24 33 Z' fill='none' stroke='white' stroke-width='6'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #ffffff;
    --sidebar-bg: #f7f7f7;
    --surface: #f4f4f4;
    --text-primary: #111111;
    --text-secondary: #555555;
    --text-muted: #999999;
    --accent: #111111;
    --border: #e8e8e8;
    --radius-full: 9999px;
    --radius-lg: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px 10px;
  }

  .new-chat-btn {
    display: flex; align-items: center; gap: 10px;
    background: #fff; border: 1px solid var(--border);
    padding: 12px 16px; border-radius: 10px;
    font-size: 13.5px; font-weight: 500; color: var(--text-primary);
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .new-chat-btn:hover { background: #f0f0f0; }

  .nav-title {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 0 8px; margin: 20px 0 8px;
  }

  .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
  .history-list::-webkit-scrollbar { width: 3px; }
  .history-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

  .history-item {
    padding: 9px 10px; font-size: 13px; color: var(--text-secondary);
    border-radius: 8px; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: all 0.15s; display: flex; justify-content: space-between; align-items: center;
  }
  .history-item:hover { background: #ebebeb; color: var(--text-primary); }
  .history-item.active { background: #e8e8e8; color: var(--text-primary); font-weight: 500; }
  .trash-btn { display: none; color: var(--text-muted); background: none; border: none; cursor: pointer; font-size: 13px; padding: 0 2px; flex-shrink: 0; }
  .history-item:hover .trash-btn { display: block; }
  .trash-btn:hover { color: #e53e3e; }

  /* ── Main ── */
  .main-content { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; min-width: 0; }

  .header {
    height: 60px; display: flex; align-items: center; padding: 0 24px;
    justify-content: space-between; border-bottom: 1px solid var(--border);
  }
  .header-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }

  .user-badge { display: flex; align-items: center; gap: 10px; }
  .user-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: #111; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0;
  }
  .user-name { font-size: 13px; color: var(--text-secondary); }
  .role-badge {
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
    background: #f0f0f0; color: var(--text-muted); font-weight: 500;
  }
  .logout-btn {
    font-size: 12px; color: var(--text-muted); background: none;
    border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 10px; cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .logout-btn:hover { border-color: #e53e3e; color: #e53e3e; }

  /* ── Chat area ── */
  .chat-container {
    flex: 1; overflow-y: auto; padding: 24px 24px 160px;
    scroll-behavior: smooth; display: flex; flex-direction: column; align-items: center;
  }
  .chat-container::-webkit-scrollbar { width: 5px; }
  .chat-container::-webkit-scrollbar-thumb { background: transparent; border-radius: 5px; }
  .chat-container:hover::-webkit-scrollbar-thumb { background: #ddd; }

  .chat-content { width: 100%; max-width: 760px; display: flex; flex-direction: column; }
  #messageList { display: flex; flex-direction: column; gap: 28px; }

  /* Empty state */
  .empty-state { display: flex; flex-direction: column; padding-top: 10vh; width: 100%; animation: fadeIn 0.4s ease; }
  .greeting-title { font-size: 36px; font-weight: 600; letter-spacing: -0.03em; color: var(--text-primary); margin-bottom: 8px; }
  .greeting-sub { font-size: 16px; color: var(--text-muted); margin-bottom: 36px; }
  .suggestions-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; }
  .suggestion-card {
    background: var(--surface); padding: 14px 16px; border-radius: 12px;
    border: 1px solid var(--border); text-align: left; cursor: pointer;
    font-size: 13.5px; color: var(--text-secondary); transition: all 0.15s;
    line-height: 1.5; font-family: inherit;
  }
  .suggestion-card:hover { background: #ebebeb; border-color: #d0d0d0; }

  /* Messages */
  .message-wrapper { display: flex; gap: 14px; animation: slideUp 0.25s ease; }
  .message-wrapper.user { flex-direction: row-reverse; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .avatar.bot { background: #111; }
  .avatar.user-av { background: #4a4a4a; color: #fff; font-size: 11px; font-weight: 600; }
  .message-content { max-width: 82%; font-size: 14.5px; line-height: 1.65; }
  .message-wrapper.bot .message-content { color: var(--text-primary); padding-top: 4px; }
  .message-wrapper.user .message-content {
    background: var(--surface); padding: 12px 18px;
    border-radius: 18px 4px 18px 18px; color: var(--text-primary);
    border: 1px solid var(--border);
  }
  .error-text { color: #e53e3e; }

  /* File attachment */
  .file-preview { width: 100%; max-width: 760px; margin-bottom: 8px; }
  .file-chip {
    display: inline-flex; align-items: center; gap: 8px;
    background: #f0f0f0; border: 1px solid var(--border);
    border-radius: var(--radius-full); padding: 5px 12px 5px 8px;
    font-size: 12.5px; color: var(--text-secondary);
  }
  .file-chip-icon { width: 18px; height: 18px; background: #111; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .file-chip-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
  .file-chip-remove { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 0; font-size: 15px; line-height: 1; }
  .file-chip-remove:hover { color: #e53e3e; }

  .uploading-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: #f9f5e8; border: 1px solid #e8d8a0;
    border-radius: var(--radius-full); padding: 5px 14px 5px 10px;
    font-size: 12.5px; color: #7a6010;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 13px; height: 13px; border: 2px solid #e8d8a0; border-top-color: #7a6010; border-radius: 50%; animation: spin 0.7s linear infinite; }

  .file-attachment-bubble {
    display: flex; align-items: center; gap: 7px;
    background: #f0f0f0; border-radius: 8px; padding: 7px 11px;
    margin-bottom: 7px; font-size: 12.5px; color: var(--text-secondary);
    border: 1px solid var(--border);
  }

  /* Input area */
  .input-area {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, #fff 75%, transparent);
    padding: 16px 24px 24px; display: flex; flex-direction: column; align-items: center;
  }
  .input-box-wrapper {
    width: 100%; max-width: 760px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 14px;
    padding: 6px 6px 6px 14px; display: flex; align-items: center; gap: 6px;
    transition: all 0.2s;
  }
  .input-box-wrapper:focus-within { background: #fff; border-color: #bbb; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .input-box { flex: 1; border: none; background: transparent; outline: none; font-size: 14.5px; color: var(--text-primary); padding: 9px 0; font-family: inherit; }
  .input-box::placeholder { color: var(--text-muted); }

  .upload-btn {
    width: 34px; height: 34px; border-radius: 8px; background: transparent;
    border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); flex-shrink: 0; transition: all 0.15s;
  }
  .upload-btn:hover { background: #e8e8e8; color: var(--text-primary); }
  .upload-btn.has-file { color: var(--text-primary); }

  .send-btn {
    width: 36px; height: 36px; border-radius: 8px; background: var(--text-primary);
    color: #fff; border: none; cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: all 0.15s; flex-shrink: 0;
  }
  .send-btn:hover { background: #333; }
  .send-btn:disabled { background: #ddd; color: #aaa; cursor: not-allowed; }
  .disclaimer { font-size: 11.5px; color: var(--text-muted); margin-top: 10px; }

  /* Typing */
  .typing-indicator { display: flex; gap: 4px; padding: 6px 0; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: #bbb; animation: bounce 1.4s infinite ease-in-out both; }
  .dot:nth-child(1) { animation-delay: -0.32s; }
  .dot:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }

  /* Tables */
  .md-table-wrap { overflow-x: auto; margin: 10px 0; border-radius: 10px; border: 1px solid var(--border); }
  .md-table { border-collapse: collapse; font-size: 13px; width: 100%; }
  .md-table th { background: #f4f4f4; font-weight: 600; color: var(--text-primary); padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .md-table td { padding: 9px 14px; border-bottom: 1px solid #f0f0f0; color: var(--text-secondary); }
  .md-table tr:last-child td { border-bottom: none; }
  .md-table tr:hover td { background: #fafafa; }
  .md-table td:not(:first-child), .md-table th:not(:first-child) { text-align: right; }

  .export-excel-btn {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;
    padding: 7px 14px; background: #111; color: #fff; border: none;
    border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer;
    transition: background 0.15s; font-family: inherit;
  }
  .export-excel-btn:hover { background: #333; }

  /* Login */
  #loginScreen {
    position: fixed; inset: 0; z-index: 1000;
    background: #fafafa;
    display: flex; align-items: center; justify-content: center;
  }
  .login-card {
    background: #fff; border: 1px solid #eaeaea; border-radius: 16px;
    padding: 48px 40px; width: 100%; max-width: 380px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.04);
    animation: fadeIn 0.4s ease;
    display: flex; flex-direction: column; align-items: center;
  }
  .login-logo-icon {
    width: 52px; height: 52px; background: #111; color: #fff;
    border-radius: 14px; display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
  }
  .login-title { font-size: 24px; font-weight: 600; color: #111; letter-spacing: -0.5px; margin-bottom: 6px; text-align: center; }
  .login-subtitle { font-size: 14px; color: #888; margin-bottom: 32px; text-align: center; }
  .login-field { width: 100%; margin-bottom: 14px; }
  .login-field input {
    width: 100%; padding: 13px 16px; border: 1px solid #e0e0e0;
    border-radius: 10px; font-size: 14.5px; color: #111;
    outline: none; transition: all 0.2s; background: #fafafa; font-family: inherit;
  }
  .login-field input:focus { border-color: #111; background: #fff; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
  .login-btn {
    width: 100%; padding: 14px; background: #111; color: #fff;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 500;
    cursor: pointer; margin-top: 6px; font-family: inherit; transition: background 0.2s;
  }
  .login-btn:hover { background: #333; }
  .login-btn:disabled { background: #aaa; cursor: not-allowed; }
  .login-error {
    width: 100%; text-align: center; background: #fef2f2; color: #dc2626;
    padding: 11px; border-radius: 8px; font-size: 13px; margin-bottom: 18px; display: none;
  }
  .login-footer { font-size: 11.5px; color: #bbb; text-align: center; margin-top: 20px; line-height: 1.6; }

  /* Animations */
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }

  /* Model selector */
  .model-selector-wrap {
    display: none;
    align-items: center;
    gap: 8px;
    margin-right: 4px;
  }
  .model-selector-wrap.visible { display: flex; }
  .model-select {
    font-size: 12px; color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 5px 10px; background: var(--surface);
    cursor: pointer; outline: none; font-family: inherit;
    transition: all 0.15s;
  }
  .model-select:hover { border-color: #bbb; background: #fff; }
  .model-label { font-size: 11.5px; color: var(--text-muted); white-space: nowrap; }

  @media (max-width: 768px) { .sidebar { display: none; } .greeting-title { font-size: 28px; } }
</style>
</head>
<body>

<div class="sidebar">
  <button class="new-chat-btn" onclick="newChat()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    New Chat
  </button>
  <div class="nav-title">Recent</div>
  <div id="historyList" class="history-list"></div>
</div>

<div class="main-content">
  <div class="header">
    <div class="header-title">Chumart AI</div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="model-selector-wrap" id="modelSelectorWrap">
        <span class="model-label">Model:</span>
        <select class="model-select" id="modelSelect" onchange="onModelChange(this.value)">
          <optgroup label="── Anthropic Claude ──">
            <option value="claude-sonnet-4-5">Claude Sonnet 4.5</option>
            <option value="claude-opus-4-5">Claude Opus 4.5</option>
            <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
          </optgroup>
          <optgroup label="── OpenAI ──">
            <option value="gpt-4o">GPT-4o</option>
            <option value="gpt-4o-mini">GPT-4o Mini</option>
            <option value="o3-mini">o3-mini</option>
            <option value="o4-mini">o4-mini</option>
          </optgroup>
        </select>
      </div>
      <div class="user-badge" id="userBadge">
      <span style="width:7px;height:7px;background:#22c55e;border-radius:50%;display:inline-block;flex-shrink:0"></span>
      <div class="user-avatar" id="userAvatar">?</div>
      <span class="user-name" id="userName"></span>
      <span class="role-badge" id="roleBadge"></span>
      <button class="logout-btn" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="chat-container" id="messagesContainer">
    <div class="chat-content">
      <div class="empty-state" id="emptyState">
        <div class="greeting-title">Hello, Chumart 👋</div>
        <div class="greeting-sub">How can I help you today?</div>
        <div class="suggestions-grid">
          <button class="suggestion-card" onclick="quickSend('Show me recent sales orders')">📊 Recent sales orders</button>
          <button class="suggestion-card" onclick="quickSend('Check inventory for 54rs')">📦 Check 54rs inventory</button>
          <button class="suggestion-card" onclick="quickSend('Find contact info for a specific customer')">👥 Find customer</button>
          <button class="suggestion-card" onclick="quickSend('How do I maintain this equipment daily?')">🔧 Product training</button>
        </div>
      </div>
      <div id="messageList"></div>
    </div>
  </div>

  <div class="input-area">
    <div id="filePreviewBar" class="file-preview" style="display:none;"></div>
    <div class="input-box-wrapper">
      <input type="file" id="fileInput" accept=".txt,.md,.csv,.pdf,.png,.jpg,.jpeg,.webp" style="display:none" onchange="handleFileSelect(event)">
      <button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()" title="Attach file">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <input class="input-box" id="inputBox" placeholder="Ask a question..." autocomplete="off"
        onkeydown="handleKey(event)" onpaste="handlePaste(event)">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="disclaimer">Chumart AI · Real-time Odoo data · Paste screenshots with Ctrl+V</div>
  </div>
</div>

<!-- Login -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      </svg>
    </div>
    <div class="login-title">Chumart AI</div>
    <div class="login-subtitle">Sign in with your Odoo account</div>
    <div class="login-error" id="loginError"></div>
    <div class="login-field">
      <input type="text" id="loginUser" placeholder="Email / Username" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()">
    </div>
    <div class="login-field">
      <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="login-footer">Your credentials are verified directly against Odoo.<br>They are never stored by this application.</div>
  </div>
</div>

<script>
  const BACKEND = 'https://chumart-ai.up.railway.app';

  let allSessions = [], currentSessionId = null, history = [], busy = false;
  let attachedFile = null, isUploading = false;
  let currentUser = null;
  let selectedModel = 'claude-sonnet-4-5';

  function onModelChange(val) {
    selectedModel = val;
    // Show current model in a subtle way
    const labels = {
      'claude-sonnet-4-5': 'Sonnet 4.5 · Default',
      'claude-opus-4-5': 'Opus 4.5 · Powerful',
      'claude-haiku-4-5-20251001': 'Haiku 4.5 · Fast'
    };
  }

  const input    = document.getElementById('inputBox');
  const sendBtn  = document.getElementById('sendBtn');
  const msgList  = document.getElementById('messageList');
  const msgCont  = document.getElementById('messagesContainer');
  const emptyEl  = document.getElementById('emptyState');
  const histEl   = document.getElementById('historyList');
  const filePrev = document.getElementById('filePreviewBar');
  const uploadBtn= document.getElementById('uploadBtn');

  // ── Init ──────────────────────────────────────────────────────────────────

  window.addEventListener('load', () => {
    const saved = localStorage.getItem('chumartChats');
    if (saved) try { allSessions = JSON.parse(saved); } catch(e) {}
    const user = sessionStorage.getItem('chumart_user');
    if (user) {
      currentUser = JSON.parse(user);
      showApp();
      if (allSessions.length > 0) loadSession(allSessions[0].id);
      else newChat();
    }
    // If not logged in, login screen stays visible
  });

  // ── Session management ────────────────────────────────────────────────────

  function newChat() {
    currentSessionId = Date.now().toString();
    history = [];
    msgList.innerHTML = '';
    emptyEl.style.display = 'flex';
    clearAttachment();
    renderSidebar();
  }

  function loadSession(id) {
    currentSessionId = id;
    const s = allSessions.find(x => x.id === id);
    history = s ? s.history : [];
    msgList.innerHTML = '';
    emptyEl.style.display = history.length ? 'none' : 'flex';
    history.forEach(m => {
      if (m.role === 'user') renderUserMsgDOM(m.content, m.fileName);
      else renderBotMsgDOM(m.content, false);
    });
    clearAttachment();
    renderSidebar();
    scrollBottom();
  }

  function saveSession(firstMsg = '') {
    let s = allSessions.find(x => x.id === currentSessionId);
    if (!s) {
      s = { id: currentSessionId, title: firstMsg.substring(0, 18) || 'New Chat', history: [] };
      allSessions.unshift(s);
    }
    s.history = history;
    localStorage.setItem('chumartChats', JSON.stringify(allSessions));
    renderSidebar();
  }

  function deleteSession(id) {
    allSessions = allSessions.filter(s => s.id !== id);
    localStorage.setItem('chumartChats', JSON.stringify(allSessions));
    if (currentSessionId === id) {
      allSessions.length ? loadSession(allSessions[0].id) : newChat();
    } else renderSidebar();
  }

  function renderSidebar() {
    histEl.innerHTML = '';
    allSessions.forEach(s => {
      const d = document.createElement('div');
      d.className = 'history-item' + (s.id === currentSessionId ? ' active' : '');
      const span = document.createElement('span');
      span.textContent = s.title;
      span.style.overflow = 'hidden';
      span.style.textOverflow = 'ellipsis';
      span.style.whiteSpace = 'nowrap';
      const del = document.createElement('button');
      del.className = 'trash-btn';
      del.textContent = '✕';
      del.onclick = e => { e.stopPropagation(); deleteSession(s.id); };
      d.appendChild(span);
      d.appendChild(del);
      d.onclick = () => loadSession(s.id);
      histEl.appendChild(d);
    });
  }

  // ── Input helpers ─────────────────────────────────────────────────────────

  input.addEventListener('input', () => { sendBtn.disabled = !input.value.trim() || busy || isUploading; });
  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
  function quickSend(t) { input.value = t; sendMessage(); }
  function scrollBottom() { msgCont.scrollTop = msgCont.scrollHeight; }
  function hideEmpty() { emptyEl.style.display = 'none'; }

  // ── File handling ─────────────────────────────────────────────────────────

  async function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    event.target.value = '';
    await uploadFile(file);
  }

  async function handlePaste(event) {
    const items = event.clipboardData && event.clipboardData.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        event.preventDefault();
        const ext = item.type.split('/')[1] || 'png';
        const file = new File([item.getAsFile()], `paste_${Date.now()}.${ext}`, { type: item.type });
        await uploadFile(file);
        return;
      }
    }
  }

  async function uploadFile(file) {
    isUploading = true;
    sendBtn.disabled = true;
    uploadBtn.classList.add('has-file');
    showFilePreview(null, file.name, true);
    try {
      const fd = new FormData();
      fd.append('file', file);
      const res = await fetch(BACKEND + '/extract-file', { method: 'POST', body: fd });
      const data = await res.json();
      if (data.error) { clearAttachment(); alert('Upload failed: ' + data.error); return; }
      attachedFile = { name: data.name || file.name, content: data.text || '', fileId: data.file_id || '' };
      showFilePreview(attachedFile.name, null, false);
    } catch (e) {
      clearAttachment(); alert('Upload error: ' + e.message);
    } finally {
      isUploading = false;
      sendBtn.disabled = !input.value.trim();
    }
  }

  function showFilePreview(name, raw, uploading) {
    filePrev.style.display = 'block';
    if (uploading) {
      filePrev.innerHTML = `<div class="uploading-badge"><div class="spinner"></div>Uploading ${escHtml(raw || '')}…</div>`;
    } else {
      filePrev.innerHTML = `<div class="file-chip">
        <div class="file-chip-icon"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg></div>
        <span class="file-chip-name">${escHtml(name)}</span>
        <button class="file-chip-remove" onclick="clearAttachment()">✕</button>
      </div>`;
    }
  }

  function clearAttachment() {
    attachedFile = null; isUploading = false;
    filePrev.style.display = 'none'; filePrev.innerHTML = '';
    uploadBtn.classList.remove('has-file');
  }

  // ── Message rendering ─────────────────────────────────────────────────────

  function renderUserMsgDOM(text, fileName) {
    hideEmpty();
    const row = document.createElement('div');
    row.className = 'message-wrapper user';
    const fileHtml = fileName ? `<div class="file-attachment-bubble">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
      ${escHtml(fileName)}</div>` : '';
    const initials = currentUser ? (currentUser.name||'U').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : 'ME';
    row.innerHTML = `<div class="avatar user-av">${initials}</div><div class="message-content">${fileHtml}${escHtml(text)}</div>`;
    msgList.appendChild(row);
  }

  function renderBotMsgDOM(text, isError) {
    const row = document.createElement('div');
    row.className = 'message-wrapper bot';
    const icon = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>`;

    // Commission export button
    let extraBtn = '';
    const ymMatch = text.match(/(\d{4})[年](\d{1,2})[月]/);
    if (ymMatch && (text.includes('销售') || text.includes('commission') || text.includes('提成') || text.includes('Commission'))) {
      const y = ymMatch[1], m = ymMatch[2].padStart(2,'0');
      extraBtn = `<a href="${BACKEND}/export/commission?year=${y}&month=${m}" target="_blank" download
        style="display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:8px 16px;background:#111;color:#fff;border-radius:8px;font-size:12.5px;font-weight:500;text-decoration:none;font-family:inherit">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Download Excel · ${y}年${m}月 Full Report</a>`;
    }

    row.innerHTML = `<div class="avatar bot">${icon}</div><div class="message-content ${isError?'error-text':''}">${formatText(text)}${extraBtn}</div>`;
    msgList.appendChild(row);
  }

  function showTyping() {
    const row = document.createElement('div');
    row.id = 'typingIndicator'; row.className = 'message-wrapper bot';
    const icon = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>`;
    row.innerHTML = `<div class="avatar bot">${icon}</div><div class="message-content"><div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    msgList.appendChild(row);
    scrollBottom();
  }
  function removeTyping() { const t = document.getElementById('typingIndicator'); if (t) t.remove(); }

  // ── Markdown rendering ────────────────────────────────────────────────────

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function inlineFormat(text) {
    text = escHtml(text);
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/__(.+?)__/g, '<strong>$1</strong>');
    text = text.replace(/\*([^*]+?)\*/g, '<em>$1</em>');
    text = text.replace(/`([^`]+?)`/g, '<code style="background:#f0f0f0;padding:1px 5px;border-radius:4px;font-size:12.5px;font-family:monospace">$1</code>');
    return text;
  }

  function parseMarkdownTable(lines, startIdx) {
    if (!lines[startIdx].includes('|')) return null;
    const headers = lines[startIdx].split('|').slice(1,-1).map(s => s.trim());
    if (!headers.length) return null;
    if (startIdx+1 >= lines.length || !/^[\|:\-\s]+$/.test(lines[startIdx+1])) return null;
    const rows = [];
    let i = startIdx + 2;
    while (i < lines.length && lines[i].includes('|')) {
      rows.push(lines[i].split('|').slice(1,-1).map(s => s.trim()));
      i++;
    }
    return { headers, rows, endIdx: i };
  }

  let _tblN = 0;
  function renderTable(headers, rows, title) {
    const tid = 'tbl_' + (++_tblN);
    const fname = (title||'report') + '_' + new Date().toISOString().slice(0,10) + '.xlsx';
    let html = `<div class="md-table-wrap"><table class="md-table" id="${tid}"><thead><tr>`;
    html += headers.map(h => `<th>${inlineFormat(h)}</th>`).join('');
    html += '</tr></thead><tbody>';
    rows.forEach(r => {
      html += '<tr>' + headers.map((_,i) => `<td>${inlineFormat(r[i]||'')}</td>`).join('') + '</tr>';
    });
    html += `</tbody></table>`;
    html += `<button class="export-excel-btn" onclick="exportTableToExcel('${tid}','${fname}')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>
      Export Excel</button></div>`;
    return html;
  }

  function exportTableToExcel(tid, fname) {
    const tbl = document.getElementById(tid);
    if (!tbl || typeof XLSX === 'undefined') return;
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.table_to_sheet(tbl);
    XLSX.utils.book_append_sheet(wb, ws, 'Report');
    XLSX.writeFile(wb, fname);
  }

  function formatText(text) {
    if (!text) return '';
    const lines = text.split('\n');
    const out = [];
    let inList = false, i = 0, tableTitle = '';
    while (i < lines.length) {
      const line = lines[i];
      const hm = line.match(/^(#{1,3})\s+(.*)/);
      if (hm) {
        tableTitle = hm[2].replace(/[^a-z0-9]/gi,'_').toLowerCase();
        if (inList) { out.push('</ul>'); inList = false; }
        const sz = hm[1].length === 1 ? 17 : hm[1].length === 2 ? 15.5 : 14;
        out.push(`<div style="font-weight:600;font-size:${sz}px;margin:14px 0 5px;color:#111">${inlineFormat(hm[2])}</div>`);
        i++; continue;
      }
      if (line.includes('|') && i+1 < lines.length && /^[\|:\-\s]+$/.test(lines[i+1])) {
        if (inList) { out.push('</ul>'); inList = false; }
        const tbl = parseMarkdownTable(lines, i);
        if (tbl && tbl.rows.length) { out.push(renderTable(tbl.headers, tbl.rows, tableTitle)); i = tbl.endIdx; continue; }
      }
      if (line.trim() === '') {
        if (inList) { out.push('</ul>'); inList = false; }
        out.push('<div style="height:7px"></div>'); i++; continue;
      }
      if (/^---+$/.test(line.trim())) {
        if (inList) { out.push('</ul>'); inList = false; }
        out.push('<hr style="border:none;border-top:1px solid #ebebeb;margin:10px 0">'); i++; continue;
      }
      const nm = line.match(/^(\d+)\.\s+(.*)/);
      if (nm) { if (inList) { out.push('</ul>'); inList = false; } out.push(`<div style="display:flex;gap:8px;margin:3px 0;padding-left:2px"><span style="flex-shrink:0;color:#888">${nm[1]}.</span><span>${inlineFormat(nm[2])}</span></div>`); i++; continue; }
      const bm = line.match(/^[\-\*•]\s+(.*)/);
      if (bm) { if (!inList) { out.push('<ul style="margin:4px 0;padding:0;list-style:none">'); inList=true; } out.push(`<li style="display:flex;gap:8px;margin:2px 0;padding-left:10px"><span style="flex-shrink:0;color:#bbb">•</span><span>${inlineFormat(bm[1])}</span></li>`); i++; continue; }
      if (inList) { out.push('</ul>'); inList = false; }
      out.push(`<div style="margin:4px 0;line-height:1.65">${inlineFormat(line)}</div>`);
      i++;
    }
    if (inList) out.push('</ul>');
    return out.join('');
  }

  // ── Send ──────────────────────────────────────────────────────────────────

  async function sendMessage() {
    const msg = input.value.trim();
    if (!msg || busy || isUploading) return;
    busy = true; input.value = ''; sendBtn.disabled = true;

    const fileForMsg = attachedFile ? { ...attachedFile } : null;
    clearAttachment();
    renderUserMsgDOM(msg, fileForMsg?.name);
    showTyping();
    if (!history.length) saveSession(msg);

    try {
      const payload = {
        message: msg,
        history: history.map(({ role, content }) => ({ role, content })),
        file_content: fileForMsg?.content || '',
        file_name: fileForMsg?.name || '',
        file_id: fileForMsg?.fileId || '',
        role: currentUser?.role || 'guest',
        user_name: currentUser?.name || '',
        user_id: currentUser?.uid || 0,
        model: selectedModel
      };
      const res = await fetch(BACKEND + '/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      removeTyping();
      const reply = data.reply || '(No response)';
      renderBotMsgDOM(reply, false);
      history.push({ role: 'user', content: msg, fileName: fileForMsg?.name || null });
      history.push({ role: 'assistant', content: reply });
      saveSession();
      scrollBottom();
    } catch (err) {
      removeTyping();
      renderBotMsgDOM('Network error: ' + err.message, true);
      scrollBottom();
    } finally {
      busy = false; sendBtn.disabled = !input.value.trim(); input.focus();
    }
  }

  // ── Auth ──────────────────────────────────────────────────────────────────

  async function doLogin() {
    const username = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPass').value;
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    if (!username || !password) { showLoginError('Please enter your username and password.'); return; }
    btn.disabled = true; btn.textContent = 'Signing in…'; errEl.style.display = 'none';
    try {
      const res = await fetch(BACKEND + '/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        currentUser = { uid: data.uid, name: data.name, username: data.username,
          role: data.role || 'guest', role_label: data.role_label || '', permissions: data.permissions || {} };
        sessionStorage.setItem('chumart_user', JSON.stringify(currentUser));
        showApp();
        if (allSessions.length) loadSession(allSessions[0].id); else newChat();
      } else {
        showLoginError(data.error || 'Invalid username or password.');
      }
    } catch (e) {
      showLoginError('Connection error. Please try again.');
    } finally {
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }

  function showLoginError(msg) {
    const el = document.getElementById('loginError');
    el.textContent = msg; el.style.display = 'block';
  }

  function showApp() {
    document.getElementById('loginScreen').style.display = 'none';
    const initials = (currentUser.name || currentUser.username || '?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    document.getElementById('userAvatar').textContent = initials;
    document.getElementById('userName').textContent = currentUser.name || currentUser.username;
    document.getElementById('roleBadge').textContent = currentUser.role_label || currentUser.role || '';
    // Show model selector for all logged-in users
    document.getElementById('modelSelectorWrap').classList.add('visible');
    // Non-admin: only show Sonnet and Haiku options
    if (currentUser.role !== 'admin') {
      const sel = document.getElementById('modelSelect');
      // Remove all options and add only allowed ones
      sel.innerHTML = `
        <optgroup label="── Claude ──">
          <option value="claude-sonnet-4-5">Claude Sonnet 4.5</option>
          <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 · Fast</option>
        </optgroup>`;
    }
  }

  function doLogout() {
    sessionStorage.removeItem('chumart_user');
    currentUser = null;
    selectedModel = 'claude-sonnet-4-5';
    document.getElementById('modelSelectorWrap').classList.remove('visible');
    // Restore full model list for next login
    document.getElementById('modelSelect').innerHTML = `
      <optgroup label="── Anthropic Claude ──">
        <option value="claude-sonnet-4-5">Claude Sonnet 4.5</option>
        <option value="claude-opus-4-5">Claude Opus 4.5</option>
        <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
      </optgroup>
      <optgroup label="── OpenAI ──">
        <option value="gpt-4o">GPT-4o</option>
        <option value="gpt-4o-mini">GPT-4o Mini</option>
        <option value="o3-mini">o3-mini</option>
        <option value="o4-mini">o4-mini</option>
      </optgroup>`;
    selectedModel = 'claude-sonnet-4-5';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
    history = []; msgList.innerHTML = ''; emptyEl.style.display = 'flex';
  }
</script>
