<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chumart Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --surface-2: #f2f2ef;
    --border: #e8e8e4;
    --border-strong: #d4d4ce;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b65;
    --text-muted: #a8a8a0;
    --accent: #2563eb;
    --accent-light: #eff4ff;
    --accent-hover: #1d4ed8;
    --user-bubble: #1a1a18;
    --success: #16a34a;
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 20px 60px rgba(0,0,0,0.1), 0 4px 16px rgba(0,0,0,0.06);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .app {
    width: 100%;
    max-width: 780px;
    height: 88vh;
    max-height: 820px;
    background: var(--surface);
    border-radius: 24px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-lg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .logo {
    width: 36px; height: 36px;
    background: var(--user-bubble);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .header-info {}
  .header-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }
  .header-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 1px;
    font-weight: 400;
  }

  .status-dot {
    width: 7px; height: 7px;
    background: var(--success);
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-modules {
    display: flex;
    gap: 6px;
  }
  .module-tag {
    padding: 4px 10px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

  /* Empty state */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 40px 20px;
  }

  .empty-icon {
    width: 52px; height: 52px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  .empty-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    text-align: center;
    letter-spacing: -0.02em;
  }

  .empty-sub {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    line-height: 1.6;
    max-width: 320px;
    margin-top: -10px;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 480px;
  }

  .suggestion {
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12.5px;
    color: var(--text-secondary);
    cursor: pointer;
    font-family: inherit;
    font-weight: 400;
    transition: all 0.15s ease;
    letter-spacing: -0.01em;
  }
  .suggestion:hover {
    background: var(--surface-2);
    border-color: var(--border-strong);
    color: var(--text-primary);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }

  /* Message rows */
  .row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: msgIn 0.25s ease;
  }
  .row.user { justify-content: flex-end; }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .avatar.bot {
    background: var(--user-bubble);
    color: white;
  }
  .avatar.user-av {
    background: var(--surface-2);
    border: 1px solid var(--border);
    font-size: 12px;
  }

  .bubble {
    max-width: 68%;
    padding: 11px 15px;
    font-size: 13.5px;
    line-height: 1.7;
    letter-spacing: -0.01em;
  }

  .bubble.bot {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px 14px 14px 14px;
    color: var(--text-primary);
  }

  .bubble.user {
    background: var(--user-bubble);
    color: #fff;
    border-radius: 14px 14px 4px 14px;
  }

  .bubble.error {
    background: #fff5f5;
    border: 1px solid #fecaca;
    border-radius: 4px 14px 14px 14px;
    color: #dc2626;
  }

  /* Typing */
  .typing-bubble {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 4px 14px 14px 14px;
    padding: 13px 16px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .typing-dot {
    width: 6px; height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: typingPulse 1.3s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typingPulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); }
    40% { opacity: 1; transform: scale(1); }
  }
  .typing-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: 4px;
    font-style: italic;
  }

  /* Divider */
  .time-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
    font-size: 11px;
  }
  .time-divider::before, .time-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Input */
  .input-area {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  .input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 6px 6px 6px 16px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-wrap:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
    background: var(--surface);
  }

  .input-box {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: inherit;
    font-size: 13.5px;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    padding: 6px 0;
  }
  .input-box::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 36px; height: 36px;
    background: var(--user-bubble);
    border: none;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .send-btn:hover:not(:disabled) {
    background: #2d2d2b;
    transform: scale(1.05);
  }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 15px; height: 15px; }

  .input-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
    text-align: center;
    letter-spacing: 0.01em;
  }

  /* Responsive */
  @media (max-width: 600px) {
    body { padding: 0; }
    .app { border-radius: 0; height: 100vh; max-height: none; border: none; }
    .header-modules { display: none; }
    .bubble { max-width: 82%; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">🤖</div>
      <div class="header-info">
        <div class="header-title">Chumart Assistant</div>
        <div class="header-sub"><span class="status-dot"></span>Connected to Odoo</div>
      </div>
    </div>
    <div class="header-modules">
      <span class="module-tag">Sales</span>
      <span class="module-tag">Inventory</span>
      <span class="module-tag">Repairs</span>
      <span class="module-tag">Customers</span>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="empty" id="emptyState">
      <div class="empty-icon">💬</div>
      <div class="empty-title">Ask me anything about your business</div>
      <div class="empty-sub">I can look up real-time data from Odoo — sales orders, inventory, repairs, and customers.</div>
      <div class="suggestions">
        <button class="suggestion" onclick="quickSend(this)">Recent sales orders</button>
        <button class="suggestion" onclick="quickSend(this)">Check product inventory</button>
        <button class="suggestion" onclick="quickSend(this)">Open repair tickets</button>
        <button class="suggestion" onclick="quickSend(this)">Find a customer</button>
        <button class="suggestion" onclick="quickSend(this)">最近的销售订单</button>
        <button class="suggestion" onclick="quickSend(this)">查询库存情况</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrap">
      <input
        class="input-box"
        id="inputBox"
        placeholder="Ask in English or Chinese…"
        onkeydown="handleKey(event)"
        autocomplete="off"
      />
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-hint">Press Enter to send · Supports English &amp; Chinese</div>
  </div>
</div>

<script>
  const BACKEND = 'https://chumart-ai.up.railway.app';
  let history = [];
  let busy = false;

  const input = document.getElementById('inputBox');
  const sendBtn = document.getElementById('sendBtn');
  const messagesEl = document.getElementById('messages');

  input.addEventListener('input', () => {
    sendBtn.disabled = !input.value.trim() || busy;
  });

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function quickSend(btn) {
    input.value = btn.textContent;
    sendMessage();
  }

  function removeEmpty() {
    const e = document.getElementById('emptyState');
    if (e) e.remove();
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addUserMsg(text) {
    removeEmpty();
    const row = document.createElement('div');
    row.className = 'row user';
    row.innerHTML = `
      <div class="bubble user">${escHtml(text)}</div>
      <div class="avatar user-av">You</div>
    `;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function showTyping() {
    removeEmpty();
    const row = document.createElement('div');
    row.className = 'row';
    row.id = 'typing';
    row.innerHTML = `
      <div class="avatar bot">AI</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <span class="typing-label">Querying Odoo…</span>
      </div>
    `;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function addBotMsg(text, isError) {
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `
      <div class="avatar bot">AI</div>
      <div class="bubble ${isError ? 'error' : 'bot'}">${renderText(text)}</div>
    `;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderText(text) {
    if (!text) return '';
    const lines = escHtml(text).split('\n');
    return lines.map(line => {
      if (line === '') return '<div style="height:5px"></div>';
      if (line.startsWith('• ') || line.startsWith('- ')) {
        return `<div style="padding-left:10px;margin:2px 0;color:inherit">${line}</div>`;
      }
      if (/^\d+\./.test(line)) {
        return `<div style="padding-left:10px;margin:2px 0">${line}</div>`;
      }
      return `<div style="margin:1px 0">${line}</div>`;
    }).join('');
  }

  async function sendMessage() {
    const msg = input.value.trim();
    if (!msg || busy) return;

    busy = true;
    input.value = '';
    sendBtn.disabled = true;

    addUserMsg(msg);
    showTyping();

    try {
      const res = await fetch(`${BACKEND}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, history })
      });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();
      removeTyping();
      const reply = data.reply || '(No response)';
      addBotMsg(reply, false);
      history.push({ role: 'user', content: msg });
      history.push({ role: 'assistant', content: reply });
    } catch (err) {
      removeTyping();
      addBotMsg(`Connection failed: ${err.message}\n\nPlease check that the backend service is running.`, true);
    } finally {
      busy = false;
      sendBtn.disabled = !input.value.trim();
      input.focus();
    }
  }
</script>
</body>
</html>
