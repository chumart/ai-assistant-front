<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>企业智能助手</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'PingFang SC', 'Noto Sans SC', sans-serif;
    background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #24243e 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .container {
    width: 100%;
    max-width: 860px;
    height: 90vh;
    max-height: 780px;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    padding: 20px 28px;
    background: rgba(255,255,255,0.05);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .title { color: #fff; font-weight: 700; font-size: 16px; }
  .subtitle { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 2px; }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    opacity: 0.6;
  }
  .empty-icon { font-size: 48px; }
  .empty-text { color: rgba(255,255,255,0.6); font-size: 14px; }
  .suggestions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
  .suggestion-btn {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid rgba(102,126,234,0.4);
    background: rgba(102,126,234,0.1);
    color: rgba(255,255,255,0.7); font-size: 12px;
    cursor: pointer; font-family: inherit;
    transition: all 0.2s;
  }
  .suggestion-btn:hover { background: rgba(102,126,234,0.2); }
  .message-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .message-row.user { justify-content: flex-end; }
  .msg-avatar {
    width: 32px; height: 32px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0; margin-top: 2px;
  }
  .msg-avatar.bot { background: linear-gradient(135deg, #667eea, #764ba2); }
  .msg-avatar.user { background: rgba(255,255,255,0.12); }
  .bubble {
    max-width: 72%;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.75;
    color: #fff;
  }
  .bubble.bot {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px 18px 18px 4px;
  }
  .bubble.user {
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 18px 18px 4px 18px;
  }
  .bubble.error {
    background: rgba(255,80,80,0.12);
    border: 1px solid rgba(255,80,80,0.3);
    border-radius: 18px 18px 18px 4px;
  }
  .typing {
    display: flex;
    gap: 6px;
    align-items: center;
    padding: 14px 18px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 18px 18px 18px 4px;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(102,126,234,0.8);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  .typing-text { color: rgba(255,255,255,0.35); font-size: 12px; margin-left: 4px; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
  .input-area {
    padding: 16px 28px 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    gap: 10px;
  }
  .input-box {
    flex: 1;
    padding: 12px 18px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    color: #fff;
    font-size: 14px;
    outline: none;
    font-family: inherit;
  }
  .input-box::placeholder { color: rgba(255,255,255,0.25); }
  .input-box:focus { border-color: rgba(102,126,234,0.5); }
  .send-btn {
    padding: 12px 22px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.2s;
  }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-left">
      <div class="avatar">🤖</div>
      <div>
        <div class="title">企业智能助手</div>
        <div class="subtitle" id="subtitle">已连接 Odoo · 销售 / 库存 / 售后 / 客户</div>
      </div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">💡</div>
      <div class="empty-text">有什么问题都可以问我～</div>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion(this)">最近有哪些销售订单？</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">查一下产品库存情况</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">有哪些未完成的维修工单？</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">查询客户信息</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <input
      class="input-box"
      id="inputBox"
      placeholder="输入问题，按 Enter 发送…"
      onkeydown="handleKey(event)"
    />
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
  </div>
</div>

<script>
  const BACKEND_URL = 'https://chumart-ai.up.railway.app';
  let history = [];
  let loading = false;

  function sendSuggestion(btn) {
    document.getElementById('inputBox').value = btn.textContent;
    sendMessage();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function formatText(text) {
    return text.split('\n').map(line => {
      if (line === '') return '<br>';
      if (line.startsWith('• ') || line.startsWith('- ')) return `<div style="padding-left:8px;margin:2px 0">${line}</div>`;
      return `<div style="margin:1px 0">${line}</div>`;
    }).join('');
  }

  function addMessage(role, content, isError) {
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();

    const messages = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = `message-row ${role}`;

    if (role === 'bot') {
      row.innerHTML = `
        <div class="msg-avatar bot">🤖</div>
        <div class="bubble ${isError ? 'error' : 'bot'}">${formatText(content)}</div>
      `;
    } else {
      row.innerHTML = `
        <div class="bubble user">${content}</div>
        <div class="msg-avatar user">👤</div>
      `;
    }
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
    return row;
  }

  function showTyping() {
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();
    const messages = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'message-row';
    row.id = 'typingIndicator';
    row.innerHTML = `
      <div class="msg-avatar bot">🤖</div>
      <div class="typing">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <span class="typing-text">查询 Odoo 中…</span>
      </div>
    `;
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('inputBox');
    const msg = input.value.trim();
    if (!msg || loading) return;

    loading = true;
    input.value = '';
    input.disabled = true;
    document.getElementById('sendBtn').disabled = true;

    addMessage('user', msg);
    showTyping();

    try {
      const res = await fetch(`${BACKEND_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, history })
      });
      if (!res.ok) throw new Error(`服务器错误 ${res.status}`);
      const data = await res.json();
      removeTyping();
      addMessage('bot', data.reply);
      history.push({ role: 'user', content: msg });
      history.push({ role: 'assistant', content: data.reply });
    } catch (e) {
      removeTyping();
      addMessage('bot', `⚠️ 连接失败：${e.message}\n\n请确认后端服务正常运行。`, true);
    } finally {
      loading = false;
      input.disabled = false;
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
